<!DOCTYPE html>

<title>Выставка студенческой фотографии "Первый и последний кадр?"</title>
<style>

  body {
    margin: 0;
    font-family: 'Bahnschrift SemiBold', sans-serif;
    background-color: #fff;
    color: #000;
  }


  header {
    text-align: center;
    padding: 40px 20px;
  }

  header h1 {
    font-size: 3em;
    margin: 0;
    line-height: 1.2;
  }

  h2, h3, p {
    margin: 10px 20px;
  }

  
  .info {
    text-align: center;
    margin-bottom: 30px;
  }


  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 10px;
  }

  .gallery img {
    width: 100%;
    max-width: 300px;
    height: auto;
    border-radius: 8px;
    object-fit: cover;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.3s;
  }

  .gallery img:hover {
    transform: scale(1.05);
  }

  /* Футер */
  footer {
    background-color: #181818;
    color: #fff;
    padding: 20px 10px;
    text-align: center;
  }

  footer p {
    margin: 8px 0;
  }

  footer a {
    color: #fff;
    text-decoration: underline;
  }


  @media(max-width: 768px) {
    header h1 {
      font-size: 2em;
    }
  }
</style>
</head>
